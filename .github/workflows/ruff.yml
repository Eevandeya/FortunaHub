name: Ruff Lint and Format Check

on:
  pull_request:
    branches:
      - master
      - develop

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install Ruff
        run: pip install ruff

      - name: Run Ruff linter for backend
        run: ruff check backend/

      - name: Run Ruff linter for bot
        run: ruff check telegram-bot/

      - name: Run Ruff formatter check for backend
        run: ruff format --check backend/

      - name: Run Ruff formatter check for bot
        run: ruff format --check telegram-bot/