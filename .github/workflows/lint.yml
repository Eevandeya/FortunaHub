name: Lint Coded Base

on:
  pull_request:
    branches:
      - master
      - develop

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
            node-version: '23.7'

      - name: Install dependencies
        run: npm install

      - name: Run ESlint
        run: npx eslint .

      - name: Run Prettier
        run: npx prettier --check .
