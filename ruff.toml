line-length = 88
target-version = "py312"

# Exclude a variety of commonly ignored directories.
exclude = [
    ".bzr",
    ".direnv",
    ".eggs",
    ".git",
    ".git-rewrite",
    ".hg",
    ".ipynb_checkpoints",
    ".mypy_cache",
    ".nox",
    ".pants.d",
    ".pyenv",
    ".pytest_cache",
    ".pytype",
    ".ruff_cache",
    ".svn",
    ".tox",
    ".venv",
    ".vscode",
    "__pypackages__",
    "_build",
    "buck-out",
    "build",
    "dist",
    "node_modules",
    "site-packages",
    "venv",
]

lint.select = [
    "E", "F", "I",
    "Q",
    "W",
    "UP",
    "N",
    "B",
    "A",
    "C90",
    "C4",
    "SIM",
    "PT",
    "TCH",
    "ANN",
    "TID",
]
lint.ignore = ["E203", "E501"]  # comparable with Black

[format]
quote-style = "double"

[lint.flake8-tidy-imports]
ban-relative-imports = "all"
