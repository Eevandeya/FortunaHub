version: "3.9"

services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-fortuna}
      POSTGRES_USER: ${POSTGRES_USER:-fortuna}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fortuna_pass}
    volumes:
      - db-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$POSTGRES_USER\" -d \"$POSTGRES_DB\" -h localhost"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      - db
    command: ["python", "manage.py", "runserver", "0.0.0.0:8000"]

  bot:
    build:
      context: ./telegram-bot
      dockerfile: Dockerfile
    env_file:
      - ./telegram-bot/.env
    volumes:
      - ./telegram-bot:/app
    ports:
      - "7765:7765"
    depends_on:
      - backend

  react-dev:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
    - ./frontend:/app
    - /app/node_modules
    working_dir: /app
volumes:
  db-data: